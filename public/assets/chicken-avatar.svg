<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2b8a3e"/>
      <stop offset="1" stop-color="#0f5a3a"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#0f303a"/>
  <circle cx="256" cy="200" r="170" fill="#138f5b" opacity="0.12" />
  <circle cx="256" cy="220" r="160" fill="#f7f2e9" />

  <!-- simple chicken head stylized -->
  <g transform="translate(140,120)">
    <ellipse cx="136" cy="120" rx="92" ry="110" fill="#c96" />
    <ellipse cx="146" cy="110" rx="70" ry="90" fill="#ffde9a" />

    <!-- eye -->
    <circle cx="120" cy="100" r="10" fill="#2b2b2b" />
    <circle cx="116" cy="96" r="3" fill="#fff" />

    <!-- beak -->
    <path d="M150 140 L180 130 L150 120 L160 135 Z" fill="#ffb84d" />

    <!-- comb -->
    <path d="M100 40 C110 10, 135 10, 140 40 C150 5, 185 5, 180 45 C200 20, 230 30, 220 70 C180 60, 140 80, 100 60 Z" fill="#d9534f" opacity="0.95" transform="translate(-20,0) scale(0.65)"/>
  </g>

  <!-- white ring border -->
  <circle cx="256" cy="220" r="168" fill="none" stroke="#ffffff" stroke-width="8" />
</svg>
