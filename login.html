
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Eco-Smart Poultry Care</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-header bg-navy text-white text-center py-4">
                        <h4 class="mb-0 fw-bold">Admin Portal</h4>
                    </div>
                    <div class="card-body p-5">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-muted">Email Address</label>
                                <input type="email" id="email" class="form-control form-control-lg border-2" placeholder="admin@eco.edu" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-bold text-muted">Password</label>
                                <input type="password" id="password" class="form-control form-control-lg border-2" placeholder="••••••••" required>
                            </div>
                            <div id="loginError" class="alert alert-danger py-2 small d-none"></div>
                            <button type="submit" class="btn btn-navy w-100 py-3 fw-bold rounded-3">Sign In</button>
                        </form>
                        <div class="text-center mt-4">
                            <a href="index.html" class="text-decoration-none small text-secondary">← Back to Home</a>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-3 small text-muted">
                    Eco-Smart Poultry System v1.0
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
